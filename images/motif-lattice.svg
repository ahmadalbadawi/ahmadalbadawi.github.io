<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" aria-hidden="true">
  <defs>
    <pattern id="lattice" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1.2" fill="currentColor"/>
      <circle cx="16" cy="0" r="0.8" fill="currentColor" opacity="0.6"/>
      <circle cx="0" cy="16" r="0.8" fill="currentColor" opacity="0.6"/>
      <circle cx="16" cy="16" r="1.4" fill="currentColor"/>
      <circle cx="32" cy="16" r="0.8" fill="currentColor" opacity="0.6"/>
      <circle cx="16" cy="32" r="0.8" fill="currentColor" opacity="0.6"/>
      <line x1="0" y1="0" x2="16" y2="16" stroke="currentColor" stroke-width="0.4" opacity="0.4"/>
      <line x1="16" y1="16" x2="32" y2="0" stroke="currentColor" stroke-width="0.4" opacity="0.4"/>
      <line x1="16" y1="16" x2="0" y2="32" stroke="currentColor" stroke-width="0.4" opacity="0.4"/>
      <line x1="16" y1="16" x2="32" y2="32" stroke="currentColor" stroke-width="0.4" opacity="0.4"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="fade-mask">
      <rect width="400" height="400" fill="url(#fade)"/>
    </mask>
  </defs>
  <rect width="400" height="400" fill="url(#lattice)" mask="url(#fade-mask)"/>
</svg>
