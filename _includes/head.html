{% include base_path %}

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

{% include seo.html %}

<link rel="alternate" type="application/atom+xml" href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" title="{{ site.title }} Feed">
<link rel="sitemap" type="application/xml" title="Sitemap" href="{{ base_path }}/sitemap.xml">

<meta name="theme-color" content="#10141c">

{% include theme-init.html %}

<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<noscript>
  <style>
    /* Mobile nav defaults to JS-toggled; without JS, force it visible. */
    @media (max-width: 767px) {
      .site-nav__list {
        position: static !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        transform: none !important;
      }
      .site-nav__toggle { display: none !important; }
    }
    .theme-toggle { display: none !important; }
  </style>
</noscript>
