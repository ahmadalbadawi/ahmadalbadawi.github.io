{% include base_path %}

{%- assign share_url = page.url | prepend: site.baseurl | prepend: site.url -%}
{%- assign share_title = page.title | markdownify | strip_html | strip_newlines | url_encode -%}

<section class="share" aria-label="Share">
  <p class="share__heading">Share this post</p>
  <ul class="inline-list">
    <li>
      <a class="btn btn--ghost" href="https://twitter.com/intent/tweet?text={{ share_title }}&url={{ share_url | url_encode }}" target="_blank" rel="noopener" aria-label="Share on X/Twitter">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        <span>Post</span>
      </a>
    </li>
    <li>
      <a class="btn btn--ghost" href="https://www.linkedin.com/sharing/share-offsite/?url={{ share_url | url_encode }}" target="_blank" rel="noopener" aria-label="Share on LinkedIn">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"/></svg>
        <span>LinkedIn</span>
      </a>
    </li>
    <li>
      <a class="btn btn--ghost" href="https://news.ycombinator.com/submitlink?u={{ share_url | url_encode }}&t={{ share_title }}" target="_blank" rel="noopener" aria-label="Share on Hacker News">
        <span>Hacker News</span>
      </a>
    </li>
  </ul>
</section>
