{% include base_path %}

{% if page.previous or page.next %}
  <nav class="pagination" aria-label="Post pagination">
    {% if page.previous %}
      <a class="btn btn--ghost" href="{{ base_path }}{{ page.previous.url }}" rel="prev">
        <span aria-hidden="true">&larr;</span>
        <span>{{ page.previous.title | markdownify | strip_html | truncate: 40 }}</span>
      </a>
    {% else %}
      <span></span>
    {% endif %}

    {% if page.next %}
      <a class="btn btn--ghost" href="{{ base_path }}{{ page.next.url }}" rel="next">
        <span>{{ page.next.title | markdownify | strip_html | truncate: 40 }}</span>
        <span aria-hidden="true">&rarr;</span>
      </a>
    {% else %}
      <span></span>
    {% endif %}
  </nav>
{% endif %}
